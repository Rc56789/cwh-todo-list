<div class="container">
    <h1 class="text-center mb-3">Todo List by Harshil Soni</h1>
<app-add-todo (todoAdd)="addTodo($event)" ></app-add-todo>
<h4>Your Todos</h4>

<div class="text-info border-white bg-dark rounded" *ngIf="this.todos.length>0; else elseBlock">
    <div *ngFor="let todo of todos; index as i">
    <app-todo-item [todo]="todo" [i]="i" (todoDelete)="deleteTodo($event)" (todoCheckbox)="toggleTodo($event)"></app-todo-item>
    </div> 
</div>

<ng-template #elseBlock>No Todos to Display</ng-template>
</div>
